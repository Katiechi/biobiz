name: biobiz_mobile
description: "BioBiz - Digital Business Card App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Models & Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Scanner
  mobile_scanner: ^6.0.10
  #camera: ^0.11.1
  #google_mlkit_text_recognition: ^0.15.0

  # QR Code
  qr_flutter: ^4.1.0

  # Image Handling
  image_picker: ^1.1.2
  #image_cropper: ^9.0.0

  # Audio Recording & Playback
  record: ^5.2.1
  just_audio: ^0.9.43

  # Location & Maps
  #geolocator: ^13.0.2
  #geocoding: ^4.0.0

  # NFC
  #nfc_manager: ^3.5.0

  # Push Notifications
  #firebase_messaging: ^15.2.4
  #flutter_local_notifications: ^18.0.1

  # Home Screen Widget
  #home_widget: ^0.7.0

  # URL Launcher & Sharing
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  
  # HTML parsing for website scraping
  html_unescape: ^2.0.0

  # Sentry
  #sentry_flutter: ^8.14.1

  # Connectivity
  connectivity_plus: ^6.1.3

  # UUID
  uuid: ^4.5.1

dependency_overrides:
  record_linux: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/privacy_policy.html
    - assets/terms_of_service.html
